services:
  - type: web
    name: learnwithsanti-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: learnwithsanti-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "learnwithsanti-backend.onrender.com"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "False"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://learnwithsanti.vercel.app"

databases:
  - name: learnwithsanti-db
    plan: free
